name: CI Quality Gate

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend - Build, Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven verify (tests + coverage threshold)
        working-directory: backend
        run: mvn -B clean verify

  frontend-tests:
    name: Frontend - Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage threshold
        working-directory: frontend
        run: npx vitest run --coverage

  backend-lint:
    name: Backend - Checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Checkstyle
        working-directory: backend
        run: mvn -B checkstyle:check

  frontend-lint:
    name: Frontend - Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint .

      - name: Run Prettier check
        working-directory: frontend
        run: npx prettier --check .

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npx tsc -b && npx vite build

  docker-build:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - backend-lint
      - frontend-tests
      - frontend-lint
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t conciliacion-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t conciliacion-frontend:ci ./frontend

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - backend-lint
      - frontend-tests
      - frontend-lint
      - frontend-build
      - docker-build
    if: ${{ always() }}

    steps:
      - name: Verify required checks
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.backend-lint.result }}" != "success" ] || \
             [ "${{ needs.frontend-tests.result }}" != "success" ] || \
             [ "${{ needs.frontend-lint.result }}" != "success" ] || \
             [ "${{ needs.frontend-build.result }}" != "success" ] || \
             [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "Quality gate failed"
            echo "backend-tests: ${{ needs.backend-tests.result }}"
            echo "backend-lint: ${{ needs.backend-lint.result }}"
            echo "frontend-tests: ${{ needs.frontend-tests.result }}"
            echo "frontend-lint: ${{ needs.frontend-lint.result }}"
            echo "frontend-build: ${{ needs.frontend-build.result }}"
            echo "docker-build: ${{ needs.docker-build.result }}"
            exit 1
          fi

          echo "Quality gate passed"
