spring:
  application:
    name: conciliacion-backend

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  conciliacion:
    source: classpath:data/conciliacion-sample.json
  auth:
    users:
      admin:
        username: ${APP_AUTH_ADMIN_USERNAME:admin}
        password: ${APP_AUTH_ADMIN_PASSWORD}
      lectura:
        username: ${APP_AUTH_LECTURA_USERNAME:lectura}
        password: ${APP_AUTH_LECTURA_PASSWORD}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET}
      expiration-ms: 86400000

logging:
  structured:
    format:
      console: logstash

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
